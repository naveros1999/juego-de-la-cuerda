<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TugXR — Jala la Cuerda</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cl:#00d4ff;--cr:#ff4d6d;--cc:#a8ff3e;
  --bg:#050a0f;--sur:#0d1a24;--bor:#1a3a50;--txt:#e0f0ff;--mut:#4a7090;
  --gl:0 0 12px #00d4ff88;--gr:0 0 12px #ff4d6d88;--gc:0 0 12px #a8ff3e88;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Rajdhani',sans-serif;}

/* ── OVERLAY ── */
#overlay{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 0%,#0a2030,#050a0f 70%);
}
.card{
  background:var(--sur);border:1px solid var(--bor);border-radius:16px;
  padding:2.5rem 2.8rem;width:min(420px,92vw);text-align:center;
  box-shadow:0 0 60px #00d4ff18,inset 0 1px 0 #ffffff0a;
  animation:fadeUp .5s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo{
  font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;letter-spacing:.12em;
  background:linear-gradient(90deg,var(--cl),var(--cc),var(--cr));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem;
}
.tagline{font-size:.95rem;color:var(--mut);letter-spacing:.2em;text-transform:uppercase;margin-bottom:2rem;}
label{display:block;text-align:left;font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mut);margin-bottom:.5rem;}
input[type=text]{
  width:100%;background:#081520;border:1px solid var(--bor);color:var(--txt);
  font-family:'Rajdhani',sans-serif;font-size:1.1rem;padding:.75rem 1rem;
  border-radius:8px;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:1.5rem;
}
input[type=text]:focus{border-color:var(--cl);box-shadow:var(--gl);}
.side-picker{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.side-btn{
  padding:.9rem;border-radius:10px;border:2px solid transparent;
  font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;
  letter-spacing:.1em;cursor:pointer;transition:all .2s;
}
.side-btn.left{color:var(--cl);border-color:var(--cl);background:#00d4ff10;}
.side-btn.right{color:var(--cr);border-color:var(--cr);background:#ff4d6d10;}
.side-btn.left.selected{background:#00d4ff22;box-shadow:var(--gl);}
.side-btn.right.selected{background:#ff4d6d22;box-shadow:var(--gr);}
.enter-btn{
  width:100%;background:linear-gradient(135deg,#00d4ff22,#a8ff3e22);
  border:1px solid var(--cc);color:var(--cc);font-family:'Orbitron',sans-serif;
  font-size:.9rem;font-weight:700;letter-spacing:.15em;padding:.9rem;
  border-radius:10px;cursor:pointer;transition:all .2s;
}
.enter-btn:hover{background:#a8ff3e22;box-shadow:var(--gc);}
.enter-btn:disabled{opacity:.35;cursor:not-allowed;}
#err-msg{font-size:.9rem;color:#ff6b6b;min-height:1.2rem;margin-top:.6rem;}

/* ── WAITING ROOM ── */
#waiting-room{
  position:fixed;inset:0;z-index:150;display:none;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 0%,#0a2030,#050a0f 70%);
  flex-direction:column;gap:2rem;
}
#waiting-room.visible{display:flex;}
.wr-card{
  background:var(--sur);border:1px solid var(--bor);border-radius:16px;
  padding:2.5rem 3rem;width:min(480px,92vw);text-align:center;
  box-shadow:0 0 60px #00d4ff18;
}
.wr-title{
  font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:700;
  color:var(--cl);letter-spacing:.12em;margin-bottom:1rem;
  text-shadow:var(--gl);
}
.wr-subtitle{font-size:1rem;color:var(--mut);letter-spacing:.1em;margin-bottom:2rem;}
.wr-pulse{
  display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:1.5rem;
}
.wr-dot{
  width:12px;height:12px;border-radius:50%;background:var(--cl);
  animation:wr-bounce 1.4s infinite ease-in-out;
}
.wr-dot:nth-child(2){animation-delay:.2s;background:var(--cc);}
.wr-dot:nth-child(3){animation-delay:.4s;background:var(--cr);}
@keyframes wr-bounce{0%,80%,100%{transform:scale(0.6);opacity:.5}40%{transform:scale(1.2);opacity:1}}
.wr-player-card{
  display:flex;align-items:center;gap:1rem;
  background:#081520;border:1px solid var(--bor);border-radius:10px;
  padding:.8rem 1.2rem;margin-bottom:.6rem;text-align:left;
}
.wr-avatar{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;
  color:#050a0f;flex-shrink:0;
}
.wr-name{font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;color:var(--txt);}
.wr-side{font-size:.75rem;color:var(--mut);letter-spacing:.15em;text-transform:uppercase;}
.wr-side.l{color:var(--cl);}
.wr-side.r{color:var(--cr);}
.wr-status{font-size:.8rem;color:var(--cc);letter-spacing:.1em;margin-top:1.2rem;}
.wr-orbit{
  width:80px;height:80px;border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--cl);border-right-color:var(--cc);
  animation:orbit 2s linear infinite;margin:0 auto 1rem;
}
@keyframes orbit{to{transform:rotate(360deg)}}

/* ── MUSIC INDICATOR ── */
#music-indicator{
  position:absolute;bottom:4.5rem;left:50%;transform:translateX(-50%);
  background:#0d1a24cc;border:1px solid var(--bor);border-radius:8px;
  padding:.4rem 1rem;font-family:'Orbitron',sans-serif;font-size:.65rem;
  letter-spacing:.15em;color:var(--mut);z-index:20;backdrop-filter:blur(6px);
  display:flex;align-items:center;gap:.5rem;transition:color .5s;
}
#music-indicator .music-bars{display:flex;align-items:flex-end;gap:2px;height:14px;}
.mbar{width:3px;border-radius:1px;background:currentColor;animation:mbar-bounce 1s infinite ease;}
.mbar:nth-child(1){height:6px;animation-delay:0s;}
.mbar:nth-child(2){height:10px;animation-delay:.1s;}
.mbar:nth-child(3){height:14px;animation-delay:.2s;}
.mbar:nth-child(4){height:8px;animation-delay:.3s;}
.mbar:nth-child(5){height:12px;animation-delay:.15s;}
@keyframes mbar-bounce{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
#music-indicator.tie{color:var(--cc);}
#music-indicator.left{color:var(--cl);}
#music-indicator.right{color:var(--cr);}

/* ── GAME SCREEN ── */
#game{position:fixed;inset:0;display:none;flex-direction:column;}
#three-canvas{position:absolute;inset:0;z-index:1;}

/* HUD */
#hud{
  position:absolute;inset:0;z-index:10;pointer-events:none;
  display:flex;flex-direction:column;justify-content:space-between;
}
.hud-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:.8rem 1.4rem;
  background:linear-gradient(180deg,#050a0fdd 0%,transparent 100%);
}
.hud-side{font-family:'Orbitron',sans-serif;}
.hud-side .num{font-size:2.4rem;font-weight:900;line-height:1;}
.hud-side .lbl{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);}
.hud-left .num{color:var(--cl);text-shadow:var(--gl);}
.hud-right .num{color:var(--cr);text-shadow:var(--gr);}
.hud-right{text-align:right;}
.hud-center-top{text-align:center;}
.tilt-lbl{font-size:.7rem;color:var(--mut);letter-spacing:.2em;text-transform:uppercase;}
.tilt-val{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;}
.tilt-val.left{color:var(--cl);text-shadow:var(--gl);}
.tilt-val.right{color:var(--cr);text-shadow:var(--gr);}
.tilt-val.center{color:var(--cc);text-shadow:var(--gc);}
.hud-bottom{
  display:flex;justify-content:center;gap:1rem;padding:1.2rem;
  background:linear-gradient(0deg,#050a0fdd 0%,transparent 100%);
  pointer-events:all;
}
.hud-btn{
  padding:.65rem 1.6rem;border-radius:8px;border:2px solid;
  font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;
  letter-spacing:.1em;cursor:pointer;transition:all .2s;background:#050a0fcc;
}
.hud-btn.left{color:var(--cl);border-color:var(--cl);}
.hud-btn.right{color:var(--cr);border-color:var(--cr);}
.hud-btn.left:hover{background:#00d4ff22;box-shadow:var(--gl);}
.hud-btn.right:hover{background:#ff4d6d22;box-shadow:var(--gr);}
.hud-btn.active{opacity:.35;cursor:default;pointer-events:none;}
.players-panel{
  position:absolute;right:1rem;top:5rem;
  background:#0d1a24cc;border:1px solid var(--bor);
  border-radius:10px;padding:.7rem 1rem;min-width:150px;
  backdrop-filter:blur(6px);z-index:15;
}
.players-panel h4{
  font-family:'Orbitron',sans-serif;font-size:.6rem;
  letter-spacing:.2em;color:var(--mut);margin-bottom:.5rem;text-transform:uppercase;
}
.player-item{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;font-size:.9rem;}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pdot.l{background:var(--cl);box-shadow:var(--gl);}
.pdot.r{background:var(--cr);box-shadow:var(--gr);}
</style>
</head>
<body>

<!-- ═══ OVERLAY LOGIN ═══ -->
<div id="overlay">
  <div class="card">
    <div class="logo">TUG<span style="opacity:.6">XR</span></div>
    <div class="tagline">Jala la cuerda · WebXR</div>
    <label for="alias-input">Tu alias</label>
    <input id="alias-input" type="text" maxlength="20" placeholder="Ej: NinjaXR" autocomplete="off"/>
    <label>Elige tu lado</label>
    <div class="side-picker">
      <button class="side-btn left" data-side="LEFT">◀ IZQUIERDA</button>
      <button class="side-btn right" data-side="RIGHT">DERECHA ▶</button>
    </div>
    <button class="enter-btn" id="enter-btn" disabled>ENTRAR AL JUEGO</button>
    <div id="err-msg"></div>
  </div>
</div>

<!-- ═══ WAITING ROOM ═══ -->
<div id="waiting-room">
  <div class="wr-card">
    <div class="wr-orbit"></div>
    <div class="wr-title">SALA DE ESPERA</div>
    <div class="wr-subtitle">Esperando que se unan más jugadores…</div>
    <div class="wr-pulse">
      <div class="wr-dot"></div>
      <div class="wr-dot"></div>
      <div class="wr-dot"></div>
    </div>
    <div id="wr-players-list"></div>
    <div class="wr-status" id="wr-status">Se necesitan al menos 2 jugadores para iniciar</div>
  </div>
</div>

<!-- ═══ GAME ═══ -->
<div id="game">
  <canvas id="three-canvas"></canvas>
  <div id="hud">
    <div class="hud-top">
      <div class="hud-side hud-left">
        <div class="num" id="hud-left-count">0</div>
        <div class="lbl">izquierda</div>
      </div>
      <div class="hud-center-top">
        <div class="tilt-lbl">inclinación</div>
        <div class="tilt-val center" id="hud-tilt">CENTRO</div>
      </div>
      <div class="hud-side hud-right">
        <div class="num" id="hud-right-count">0</div>
        <div class="lbl">derecha</div>
      </div>
    </div>
    <div class="hud-bottom">
      <button class="hud-btn left" id="btn-go-left" onclick="pickSide('LEFT')">◀ IZQUIERDA</button>
      <button class="hud-btn right" id="btn-go-right" onclick="pickSide('RIGHT')">DERECHA ▶</button>
    </div>
  </div>
  <div class="players-panel">
    <h4>Jugadores</h4>
    <div id="players-list"></div>
  </div>
  <div id="music-indicator">
    <div class="music-bars">
      <div class="mbar"></div><div class="mbar"></div><div class="mbar"></div>
      <div class="mbar"></div><div class="mbar"></div>
    </div>
    <span id="music-label">EMPATE</span>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════════
const SUPABASE_URL = 'https://uedxajxmliwxdbbhphse.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZHhhanhtbGl3eGRiYmhwaHNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzAzNTgsImV4cCI6MjA5NDgwNjM1OH0.nZP8wR-52xoR9nwaXAmc00h1zxd51vWnEZJFmPgu464';
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════════
// MÚSICA ADAPTATIVA (Web Audio API)
// ══════════════════════════════════════════════
let audioCtx = null;
let currentMusicState = null; // 'tie' | 'left' | 'right'
let musicNodes = {};

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function stopMusic() {
  Object.values(musicNodes).forEach(n => {
    try { n.stop(); } catch(e) {}
  });
  musicNodes = {};
}

// Música de empate: arpegio neutro y tenso, escala menor natural
function playTieMusic() {
  if (!audioCtx) return;
  stopMusic();
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.18, audioCtx.currentTime);
  master.connect(audioCtx.destination);
  musicNodes._master = master;

  const notes = [220, 261.63, 311.13, 369.99, 440, 369.99, 311.13, 261.63];
  const stepTime = 0.22;
  let t = audioCtx.currentTime + 0.05;

  function scheduleLoop() {
    for (let i = 0; i < notes.length; i++) {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = notes[i];
      env.gain.setValueAtTime(0, t + i * stepTime);
      env.gain.linearRampToValueAtTime(0.7, t + i * stepTime + 0.02);
      env.gain.exponentialRampToValueAtTime(0.001, t + i * stepTime + stepTime * 0.9);
      osc.connect(env);
      env.connect(master);
      osc.start(t + i * stepTime);
      osc.stop(t + i * stepTime + stepTime);
    }
    const loopDur = notes.length * stepTime;
    const loopId = setTimeout(() => {
      if (currentMusicState === 'tie' && audioCtx) scheduleLoop();
    }, loopDur * 1000 - 60);
    musicNodes._loopId = loopId;
  }
  scheduleLoop();

  // Bajo sostenido
  const bass = audioCtx.createOscillator();
  const bassGain = audioCtx.createGain();
  bass.type = 'sine';
  bass.frequency.value = 110;
  bassGain.gain.value = 0.12;
  bass.connect(bassGain);
  bassGain.connect(master);
  bass.start();
  musicNodes._bass = bass;
}

// Música de ganando: según qué lado va ganando, tono diferente y ritmo más rápido
function playWinningMusic(side) {
  if (!audioCtx) return;
  stopMusic();
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.2, audioCtx.currentTime);
  master.connect(audioCtx.destination);
  musicNodes._master = master;

  // Izquierda gana: escala mayor ascendente brillante (C mayor), más aguda
  // Derecha gana: escala pentatónica descendente más grave y agresiva
  const isLeft = side === 'left';
  const notes = isLeft
    ? [261.63, 293.66, 329.63, 392, 440, 523.25, 587.33, 659.25]
    : [493.88, 440, 392, 349.23, 293.66, 261.63, 220, 196];
  const stepTime = isLeft ? 0.18 : 0.14;
  const oscType = isLeft ? 'square' : 'sawtooth';

  let t = audioCtx.currentTime + 0.05;

  function scheduleLoop() {
    for (let i = 0; i < notes.length; i++) {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.type = oscType;
      osc.frequency.value = notes[i];
      env.gain.setValueAtTime(0, t + i * stepTime);
      env.gain.linearRampToValueAtTime(0.6, t + i * stepTime + 0.015);
      env.gain.exponentialRampToValueAtTime(0.001, t + i * stepTime + stepTime * 0.85);
      // Efecto lowpass para la derecha
      if (!isLeft) {
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'lowpass';
        filt.frequency.value = 800;
        osc.connect(filt);
        filt.connect(env);
      } else {
        osc.connect(env);
      }
      env.connect(master);
      osc.start(t + i * stepTime);
      osc.stop(t + i * stepTime + stepTime);
    }
    // Percusión simple (ruido corto)
    for (let i = 0; i < 4; i++) {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1) * (1 - j / data.length);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const env2 = audioCtx.createGain();
      env2.gain.value = 0.08;
      src.connect(env2);
      env2.connect(master);
      src.start(t + i * stepTime * 2);
    }

    const loopDur = notes.length * stepTime;
    const loopId = setTimeout(() => {
      if ((currentMusicState === 'left' && side === 'left') ||
          (currentMusicState === 'right' && side === 'right')) {
        scheduleLoop();
      }
    }, loopDur * 1000 - 60);
    musicNodes._loopId = loopId;
  }
  scheduleLoop();

  // Bajo diferente por bando
  const bass = audioCtx.createOscillator();
  const bassGain = audioCtx.createGain();
  bass.type = 'sine';
  bass.frequency.value = isLeft ? 130.81 : 98;
  bassGain.gain.value = 0.15;
  bass.connect(bassGain);
  bassGain.connect(master);
  bass.start();
  musicNodes._bass = bass;
}

function updateMusic(state) {
  let newState;
  if (state.left === state.right) newState = 'tie';
  else if (state.left > state.right) newState = 'left';
  else newState = 'right';

  if (newState === currentMusicState) return;
  currentMusicState = newState;

  ensureAudio();
  if (newState === 'tie') {
    playTieMusic();
    const mi = document.getElementById('music-indicator');
    mi.className = 'tie';
    document.getElementById('music-label').textContent = 'EMPATE';
  } else {
    playWinningMusic(newState);
    const mi = document.getElementById('music-indicator');
    mi.className = newState;
    document.getElementById('music-label').textContent =
      newState === 'left' ? 'IZQUIERDA GANA' : 'DERECHA GANA';
  }
}

// ══════════════════════════════════════════════
// THREE.JS — BALANZA 3D + FONDO ESTRELLADO
// ══════════════════════════════════════════════
let scene, camera, renderer, balanceGroup, armMesh, weightLeft, weightRight;
let currentAngle = 0, targetAngle = 0;
const clock = new THREE.Clock();

function init3D() {
  const canvas = document.getElementById('three-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x050a0f, 1);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.5, 9);
  camera.lookAt(0, 0.5, 0);

  // ── ESTRELLAS ──
  const starGeo = new THREE.BufferGeometry();
  const starCount = 2200;
  const positions = new Float32Array(starCount * 3);
  const colors = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 80 + Math.random() * 120;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    // Variación de color: blanco azulado, blanco, suave amarillo
    const t = Math.random();
    colors[i*3]   = 0.85 + t * 0.15;
    colors[i*3+1] = 0.85 + t * 0.1;
    colors[i*3+2] = 0.9 + (1 - t) * 0.1;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const starMat = new THREE.PointsMaterial({ size: 0.28, vertexColors: true, transparent: true, opacity: 0.85 });
  scene.add(new THREE.Points(starGeo, starMat));

  // Algunas estrellas grandes brillantes
  const brightGeo = new THREE.BufferGeometry();
  const bp = new Float32Array(60 * 3);
  for (let i = 0; i < 60; i++) {
    bp[i*3] = (Math.random() - 0.5) * 160;
    bp[i*3+1] = (Math.random() - 0.5) * 80;
    bp[i*3+2] = -40 - Math.random() * 60;
  }
  brightGeo.setAttribute('position', new THREE.BufferAttribute(bp, 3));
  const brightMat = new THREE.PointsMaterial({ size: 0.7, color: 0xaaddff, transparent: true, opacity: 0.6 });
  scene.add(new THREE.Points(brightGeo, brightMat));

  // ── NIEBLA ESPACIAL ──
  scene.fog = new THREE.FogExp2(0x050a0f, 0.004);

  // ── LUZ ──
  scene.add(new THREE.AmbientLight(0x334455, 1.2));
  const dirL = new THREE.DirectionalLight(0x88ccff, 2.0);
  dirL.position.set(5, 8, 5);
  scene.add(dirL);
  const dirR = new THREE.DirectionalLight(0xff6688, 1.2);
  dirR.position.set(-5, 4, 3);
  scene.add(dirR);

  // ── SOPORTE CENTRAL ──
  const postMat = new THREE.MeshStandardMaterial({ color: 0x1a3a50, metalness: 0.7, roughness: 0.3 });
  const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 3.5, 12), postMat);
  post.position.set(0, -0.25, 0);
  scene.add(post);

  // Base del soporte
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.7, 0.15, 16), postMat);
  base.position.set(0, -1.95, 0);
  scene.add(base);

  // Pivote central (esfera verde brillante)
  const pivotMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xa8ff3e, emissive: 0x3a6010, metalness: 0.3, roughness: 0.4 })
  );
  pivotMesh.position.set(0, 1.5, 0);
  scene.add(pivotMesh);

  // ── GRUPO BALANZA ──
  balanceGroup = new THREE.Group();
  balanceGroup.position.set(0, 1.5, 0);
  scene.add(balanceGroup);

  // Barra horizontal
  const barMat = new THREE.MeshStandardMaterial({ color: 0x90b8cc, metalness: 0.6, roughness: 0.35 });
  armMesh = new THREE.Mesh(new THREE.BoxGeometry(7.2, 0.14, 0.14), barMat);
  balanceGroup.add(armMesh);

  // Cuerdas (cilindros delgados)
  const ropeMat = new THREE.MeshStandardMaterial({ color: 0xe0c080, roughness: 0.7 });
  const ropeGeo = new THREE.CylinderGeometry(0.025, 0.025, 1.2, 6);
  const ropeL = new THREE.Mesh(ropeGeo, ropeMat);
  ropeL.position.set(-3, -0.6, 0);
  balanceGroup.add(ropeL);
  const ropeR = new THREE.Mesh(ropeGeo, ropeMat);
  ropeR.position.set(3, -0.6, 0);
  balanceGroup.add(ropeR);

  // Pesos (cajas)
  const wMatL = new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x004466, metalness: 0.4, roughness: 0.3 });
  const wMatR = new THREE.MeshStandardMaterial({ color: 0xff4d6d, emissive: 0x440018, metalness: 0.4, roughness: 0.3 });
  const wGeo = new THREE.BoxGeometry(0.9, 0.7, 0.5);

  weightLeft = new THREE.Mesh(wGeo, wMatL);
  weightLeft.position.set(-3, -1.55, 0);
  balanceGroup.add(weightLeft);

  weightRight = new THREE.Mesh(wGeo, wMatR);
  weightRight.position.set(3, -1.55, 0);
  balanceGroup.add(weightRight);

  // Bordes luminosos en pesos (wireframe)
  const edgesL = new THREE.LineSegments(
    new THREE.EdgesGeometry(wGeo),
    new THREE.LineBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.7 })
  );
  edgesL.position.copy(weightLeft.position);
  balanceGroup.add(edgesL);
  const edgesR = new THREE.LineSegments(
    new THREE.EdgesGeometry(wGeo),
    new THREE.LineBasicMaterial({ color: 0xff4d6d, transparent: true, opacity: 0.7 })
  );
  edgesR.position.copy(weightRight.position);
  balanceGroup.add(edgesR);

  // ── SUELO ──
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(30, 20),
    new THREE.MeshStandardMaterial({ color: 0x0a1420, roughness: 0.9 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -4;
  scene.add(floor);

  // Grid sutil en el suelo
  const grid = new THREE.GridHelper(30, 30, 0x1a3a50, 0x0d1e28);
  grid.position.y = -3.98;
  scene.add(grid);

  window.addEventListener('resize', onResize);
  animate3D();
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

let starRotSpeed = 0.00008;
function animate3D() {
  requestAnimationFrame(animate3D);
  const dt = clock.getDelta();

  // Rotación suave de la balanza hacia el ángulo objetivo
  currentAngle += (targetAngle - currentAngle) * Math.min(dt * 2.5, 1);
  if (balanceGroup) {
    balanceGroup.rotation.z = currentAngle;
    // Micro-oscilación para dar vida
    balanceGroup.rotation.z += Math.sin(Date.now() * 0.001) * 0.003;
  }

  // Leve movimiento de cámara
  camera.position.x = Math.sin(Date.now() * 0.0002) * 0.5;
  camera.position.y = 1.5 + Math.sin(Date.now() * 0.00015) * 0.2;
  camera.lookAt(0, 0.5, 0);

  // Pulsación de pesos según estado
  const pulse = 1 + Math.sin(Date.now() * 0.004) * 0.025;
  if (weightLeft) weightLeft.scale.set(pulse, 1 / pulse, pulse);
  if (weightRight) weightRight.scale.set(1 / pulse, pulse, 1 / pulse);

  renderer.render(scene, camera);
}

function setBalanceAngle(leftCount, rightCount) {
  const diff = leftCount - rightCount;
  const maxDeg = 25;
  const maxDiff = 8;
  targetAngle = (diff / maxDiff) * (maxDeg * Math.PI / 180);
  targetAngle = Math.max(-maxDeg * Math.PI / 180, Math.min(maxDeg * Math.PI / 180, targetAngle));
}

// ══════════════════════════════════════════════
// LÓGICA PURA
// ══════════════════════════════════════════════
function validateAlias(alias) {
  if (typeof alias !== 'string') return { valid: false, error: 'Alias inválido.' };
  const t = alias.trim();
  if (!t.length)     return { valid: false, error: 'El alias no puede estar vacío.' };
  if (t.length < 2)  return { valid: false, error: 'Mínimo 2 caracteres.' };
  if (t.length > 20) return { valid: false, error: 'Máximo 20 caracteres.' };
  if (!/^[a-zA-Z0-9_\- ]+$/.test(t)) return { valid: false, error: 'Solo letras, números, guiones y espacios.' };
  return { valid: true };
}
function countSides(players) {
  let left=0,right=0;
  for(const p of players){ if(p.side==='LEFT')left++; else if(p.side==='RIGHT')right++; }
  return {left,right};
}
function calcRopeOffset(left,right){ return (left<0||right<0)?0:(left-right)*25; }
function getTiltDirection(offset){ return offset<0?'LEFT':offset>0?'RIGHT':'CENTER'; }
function getGameState(players){
  const {left,right}=countSides(players);
  const offset=calcRopeOffset(left,right);
  return {left,right,offset,tilt:getTiltDirection(offset),canStart:players.length>=2};
}

// ══════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════
let myId=crypto.randomUUID(), myAlias='', mySide=null, players=[];
const $=id=>document.getElementById(id);

// ══════════════════════════════════════════════
// LOGIN UI
// ══════════════════════════════════════════════
document.querySelectorAll('.side-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.side-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    mySide=btn.dataset.side;
    updateBtn(); $('err-msg').textContent='';
  });
});
$('alias-input').addEventListener('input',()=>{ $('err-msg').textContent=''; updateBtn(); });
function updateBtn(){
  const v=validateAlias($('alias-input').value);
  $('enter-btn').disabled=!(v.valid&&mySide);
}

const AVATAR_COLORS=['#00d4ff','#ff4d6d','#a8ff3e','#ffcc00','#c084fc','#fb923c','#34d399','#f472b6'];
function avatarColor(alias){ return AVATAR_COLORS[(alias.charCodeAt(0)||0)%AVATAR_COLORS.length]; }

// Sala de espera render
function renderWaitingRoom() {
  const list = $('wr-players-list');
  list.innerHTML = '';
  players.forEach(p => {
    const col = avatarColor(p.alias);
    const div = document.createElement('div');
    div.className = 'wr-player-card';
    div.innerHTML = `
      <div class="wr-avatar" style="background:${col}">${p.alias.charAt(0).toUpperCase()}</div>
      <div>
        <div class="wr-name">${p.alias}${p.id===myId?' ✦':''}</div>
        <div class="wr-side ${p.side==='LEFT'?'l':'r'}">${p.side==='LEFT'?'◀ Izquierda':'Derecha ▶'}</div>
      </div>
    `;
    list.appendChild(div);
  });
  const cnt = players.length;
  $('wr-status').textContent = cnt >= 2
    ? `${cnt} jugador${cnt>1?'es':''} conectado${cnt>1?'s':''} — ¡listo para jugar!`
    : 'Se necesitan al menos 2 jugadores para iniciar';
}

$('enter-btn').addEventListener('click',async()=>{
  const aliasRaw=$('alias-input').value.trim();
  const v=validateAlias(aliasRaw);
  if(!v.valid){ $('err-msg').textContent=v.error; return; }
  if(!mySide){ $('err-msg').textContent='Elige un lado.'; return; }
  myAlias=aliasRaw;
  $('enter-btn').disabled=true;
  $('enter-btn').textContent='CONECTANDO…';
  try{
    const {error}=await sbClient.from('tug_players').upsert({id:myId,alias:myAlias,side:mySide});
    if(error)throw error;
    startSession();
  }catch(err){
    console.error(err);
    $('err-msg').textContent='Error de conexión.';
    $('enter-btn').disabled=false;
    $('enter-btn').textContent='ENTRAR AL JUEGO';
  }
});

// ══════════════════════════════════════════════
// HEARTBEAT
// ══════════════════════════════════════════════
let heartbeatInterval = null;
async function sendHeartbeat() {
  await sbClient.from("tug_players").update({ last_seen: new Date().toISOString() }).eq("id", myId);
}
async function cleanDeadPlayers() {
  const cutoff = new Date(Date.now() - 30000).toISOString();
  await sbClient.from("tug_players").delete().lt("last_seen", cutoff);
  await fetchAllPlayers();
  renderScene();
}

// ══════════════════════════════════════════════
// FLUJO: LOGIN → WAITING ROOM → GAME
// ══════════════════════════════════════════════
async function startSession(){
  $('overlay').style.display='none';
  await fetchAllPlayers();

  // Suscribir realtime
  sbClient.channel('tug_room')
    .on('postgres_changes',{event:'*',schema:'public',table:'tug_players'},payload=>{
      handleRT(payload);
    }).subscribe();

  window.addEventListener('beforeunload', removeMyself);
  sendHeartbeat();
  heartbeatInterval = setInterval(async () => {
    sendHeartbeat();
    await cleanDeadPlayers();
  }, 15000);

  checkPhase();
}

function checkPhase(){
  const state = getGameState(players);
  if(!state.canStart){
    // Mostrar sala de espera
    $('waiting-room').classList.add('visible');
    $('game').style.display='none';
    renderWaitingRoom();
  } else {
    // Entrar al juego
    $('waiting-room').classList.remove('visible');
    if($('game').style.display !== 'flex' && $('game').style.display !== 'block'){
      $('game').style.display='block';
      // Iniciar Three.js solo una vez
      if(!renderer) init3D();
      // Activar audio en primer gesto — usuario ya hizo click en "entrar"
      ensureAudio();
    }
    renderScene();
  }
}

function handleRT({eventType,new:row,old}){
  if(eventType==='INSERT'){ if(!players.find(p=>p.id===row.id))players.push(row); }
  else if(eventType==='UPDATE'){ const i=players.findIndex(p=>p.id===row.id); if(i>=0)players[i]=row; else players.push(row); }
  else if(eventType==='DELETE'){ players=players.filter(p=>p.id!==old.id); }
  checkPhase();
}
async function fetchAllPlayers(){
  const {data,error}=await sbClient.from('tug_players').select('*');
  if(!error&&data)players=data;
}
async function pickSide(side){
  if(side===mySide)return;
  mySide=side;
  await sbClient.from('tug_players').update({side}).eq('id',myId);
  renderScene();
}
async function removeMyself(){ await sbClient.from('tug_players').delete().eq('id',myId); }

// ══════════════════════════════════════════════
// RENDER ESCENA JUEGO
// ══════════════════════════════════════════════
function renderScene(){
  const state=getGameState(players);

  // Si ya no hay suficientes jugadores, volver a waiting
  if(!state.canStart){ checkPhase(); return; }

  // HUD
  $('hud-left-count').textContent=state.left;
  $('hud-right-count').textContent=state.right;
  const tiltEl=$('hud-tilt');
  tiltEl.textContent={LEFT:'IZQUIERDA',CENTER:'CENTRO',RIGHT:'DERECHA'}[state.tilt];
  tiltEl.className='tilt-val '+state.tilt.toLowerCase();

  $('btn-go-left').classList.toggle('active',mySide==='LEFT');
  $('btn-go-right').classList.toggle('active',mySide==='RIGHT');

  // Lista jugadores
  const list=$('players-list'); list.innerHTML='';
  players.forEach(p=>{
    const item=document.createElement('div'); item.className='player-item';
    const dot=document.createElement('span'); dot.className='pdot '+(p.side==='LEFT'?'l':'r');
    const name=document.createElement('span');
    name.textContent=p.alias+(p.id===myId?' ✦':'');
    name.style.color=p.id===myId?'#fff':'var(--mut)';
    item.append(dot,name); list.appendChild(item);
  });

  // Balanza 3D
  setBalanceAngle(state.left, state.right);

  // Música
  updateMusic(state);
}
</script>
