<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TugXR — Jala la Cuerda</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cl:#00d4ff;--cr:#ff4d6d;--cc:#a8ff3e;
  --bg:#050a0f;--sur:#0d1a24;--bor:#1a3a50;--txt:#e0f0ff;--mut:#4a7090;
  --gl:0 0 16px #00d4ff99;--gr:0 0 16px #ff4d6d99;--gc:0 0 16px #a8ff3e99;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--txt);}

/* OVERLAY */
#overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#0a2030,#050a0f 70%);}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:2.5rem 2.8rem;width:min(420px,92vw);text-align:center;box-shadow:0 0 60px #00d4ff15,inset 0 1px 0 #ffffff0a;animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;letter-spacing:.12em;background:linear-gradient(90deg,var(--cl),var(--cc),var(--cr));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem;}
.tagline{font-size:.9rem;color:var(--mut);letter-spacing:.2em;text-transform:uppercase;margin-bottom:2rem;}
label{display:block;text-align:left;font-size:.82rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mut);margin-bottom:.45rem;}
input[type=text]{width:100%;background:#081520;border:1px solid var(--bor);color:var(--txt);font-family:'Rajdhani',sans-serif;font-size:1.1rem;padding:.72rem 1rem;border-radius:8px;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:1.4rem;}
input[type=text]:focus{border-color:var(--cl);box-shadow:var(--gl);}
.side-picker{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1.4rem;}
.side-btn{padding:.85rem;border-radius:10px;border:2px solid transparent;font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .2s;}
.side-btn.left{color:var(--cl);border-color:var(--cl);background:#00d4ff0d;}
.side-btn.right{color:var(--cr);border-color:var(--cr);background:#ff4d6d0d;}
.side-btn.left.selected{background:#00d4ff22;box-shadow:var(--gl);}
.side-btn.right.selected{background:#ff4d6d22;box-shadow:var(--gr);}
.enter-btn{width:100%;background:linear-gradient(135deg,#00d4ff22,#a8ff3e22);border:1px solid var(--cc);color:var(--cc);font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:.14em;padding:.88rem;border-radius:10px;cursor:pointer;transition:all .2s;}
.enter-btn:hover{background:#a8ff3e22;box-shadow:var(--gc);}
.enter-btn:disabled{opacity:.3;cursor:not-allowed;}
#err-msg{font-size:.88rem;color:#ff6b6b;min-height:1.2rem;margin-top:.5rem;}

/* GAME */
#game{position:fixed;inset:0;display:none;overflow:hidden;}

/* ESTRELLAS */
#stars-bg{position:absolute;inset:0;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.1}to{opacity:.95}}

/* ESCENA 3D */
#scene3d{
  position:absolute;inset:0;z-index:1;
  display:flex;align-items:center;justify-content:center;
  perspective:900px;
}
.world{
  position:relative;width:620px;height:480px;
  transform-style:preserve-3d;
  transform:rotateX(8deg);
}
/* soporte */
.pole{
  position:absolute;left:50%;top:40px;
  width:10px;height:160px;
  background:linear-gradient(90deg,#1a3a50,#2a5a70,#1a3a50);
  border-radius:5px;
  transform:translateX(-50%);
  box-shadow:0 0 12px #00d4ff44;
}
.pole-base{
  position:absolute;left:50%;top:196px;
  width:60px;height:12px;
  background:#1a3a50;border-radius:6px;
  transform:translateX(-50%);
}
/* pivote */
.pivot{
  position:absolute;left:50%;top:186px;
  width:22px;height:22px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#c8ff60,#7acc20);
  transform:translateX(-50%);
  box-shadow:0 0 14px #a8ff3ebb,0 0 30px #a8ff3e44;
  z-index:10;
}
/* barra */
#bar-wrap{
  position:absolute;left:50%;top:186px;
  width:500px;height:20px;
  transform-origin:center 50%;
  transform:translateX(-50%) rotate(0deg);
  transition:transform .7s cubic-bezier(.34,1.56,.64,1);
  z-index:5;
}
.bar{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#b0d4e8 0%,#7090a8 40%,#506070 100%);
  border-radius:10px;
  box-shadow:0 2px 8px #000a, 0 0 16px #00d4ff22;
}
/* cuerdas */
.rope{
  position:absolute;top:20px;
  width:4px;border-radius:2px;
  background:linear-gradient(180deg,#c8a850,#906830);
  box-shadow:0 0 4px #c8a85044;
}
.rope.left{left:38px;height:90px;transform-origin:top center;}
.rope.right{right:38px;height:90px;transform-origin:top center;}
/* pesos */
.weight{
  position:absolute;top:110px;
  width:72px;height:60px;
  border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:900;
  box-shadow:0 4px 16px #0008,0 0 24px var(--wc,#fff6);
  transition:box-shadow .4s;
}
.weight.left{left:4px;background:linear-gradient(135deg,#003c55,#005a80);border:2px solid var(--cl);--wc:#00d4ff88;}
.weight.right{right:4px;background:linear-gradient(135deg,#550020,#800030);border:2px solid var(--cr);--wc:#ff4d6d88;}
.weight .wnum{font-size:1.5rem;line-height:1;color:#fff;}
.weight .wlbl{font-size:.55rem;letter-spacing:.18em;opacity:.7;margin-top:2px;}
/* facets 3d */
.weight::before{
  content:'';position:absolute;inset:0;border-radius:8px;
  background:linear-gradient(135deg,#ffffff18 0%,transparent 50%);
}
/* suelo 3d */
.floor{
  position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(180deg,#0d1a24,#081015);
  border-top:2px solid #1a3a50;
  border-radius:0 0 12px 12px;
}
.zone{
  position:absolute;bottom:60px;width:220px;height:260px;
  border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:16px;
}
.zone.left{left:10px;background:linear-gradient(180deg,transparent,#00d4ff08);border:1px solid #00d4ff15;}
.zone.right{right:10px;background:linear-gradient(180deg,transparent,#ff4d6d08);border:1px solid #ff4d6d15;}
.zone-lbl{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.2em;opacity:.35;}
.zone.left .zone-lbl{color:var(--cl);}
.zone.right .zone-lbl{color:var(--cr);}

/* avatares dentro de zonas */
#avs-left,#avs-right{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
  padding:8px 8px 4px;flex:1;align-content:flex-end;
}
.av-chip{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;
  color:#050a0f;position:relative;
  box-shadow:0 0 10px var(--ac,#fff4);
  transition:transform .3s;
}
.av-chip:hover{transform:scale(1.1);}
.av-chip .av-tooltip{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#0d1a24;border:1px solid var(--bor);border-radius:6px;
  padding:3px 8px;font-size:.65rem;font-family:'Rajdhani',sans-serif;
  white-space:nowrap;color:var(--txt);pointer-events:none;opacity:0;transition:opacity .2s;
}
.av-chip:hover .av-tooltip{opacity:1;}

/* HUD */
#hud{position:absolute;inset:0;z-index:20;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;}
.hud-top{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.4rem;background:linear-gradient(180deg,#050a0fee 0%,transparent 100%);}
.hud-side{font-family:'Orbitron',sans-serif;}
.hud-side .num{font-size:2.4rem;font-weight:900;line-height:1;}
.hud-side .lbl{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);}
.hud-left .num{color:var(--cl);text-shadow:var(--gl);}
.hud-right .num{color:var(--cr);text-shadow:var(--gr);}
.hud-right{text-align:right;}
.hud-mid{text-align:center;}
.tilt-lbl{font-size:.68rem;color:var(--mut);letter-spacing:.2em;text-transform:uppercase;}
.tilt-val{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;}
.tilt-val.left{color:var(--cl);text-shadow:var(--gl);}
.tilt-val.right{color:var(--cr);text-shadow:var(--gr);}
.tilt-val.center{color:var(--cc);text-shadow:var(--gc);}
.hud-bottom{display:flex;justify-content:center;gap:1rem;padding:1.2rem;background:linear-gradient(0deg,#050a0fee 0%,transparent 100%);pointer-events:all;}
.hud-btn{padding:.65rem 1.5rem;border-radius:8px;border:2px solid;font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .2s;background:#050a0fcc;}
.hud-btn.left{color:var(--cl);border-color:var(--cl);}
.hud-btn.right{color:var(--cr);border-color:var(--cr);}
.hud-btn.left:hover{background:#00d4ff22;box-shadow:var(--gl);}
.hud-btn.right:hover{background:#ff4d6d22;box-shadow:var(--gr);}
.hud-btn.active{opacity:.3;cursor:default;pointer-events:none;}

/* panel jugadores */
.players-panel{position:absolute;right:1rem;top:5rem;background:#0d1a24dd;border:1px solid var(--bor);border-radius:10px;padding:.7rem 1rem;min-width:155px;backdrop-filter:blur(8px);z-index:25;}
.players-panel h4{font-family:'Orbitron',sans-serif;font-size:.58rem;letter-spacing:.22em;color:var(--mut);margin-bottom:.5rem;text-transform:uppercase;}
.player-item{display:flex;align-items:center;gap:.5rem;margin-bottom:.28rem;font-size:.88rem;}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pdot.l{background:var(--cl);box-shadow:var(--gl);}
.pdot.r{background:var(--cr);box-shadow:var(--gr);}

/* botones top-right */
.top-controls{position:absolute;top:1rem;left:1rem;display:flex;gap:.6rem;z-index:30;}
.ctrl-btn{padding:.45rem .9rem;border-radius:8px;border:1px solid;font-family:'Orbitron',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .2s;background:#050a0fcc;}
#music-btn{color:var(--cc);border-color:var(--cc);}
#music-btn:hover{background:#a8ff3e22;box-shadow:var(--gc);}
#logout-btn{color:#ff6b6b;border-color:#ff6b6b;}
#logout-btn:hover{background:#ff6b6b22;box-shadow:0 0 10px #ff6b6b66;}

/* SALA DE ESPERA */
#waiting-screen{
  position:fixed;inset:0;z-index:300;
  display:none;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 30%,#081820,#050a0f 70%);
}
.wait-card{
  background:var(--sur);border:1px solid var(--bor);border-radius:16px;
  padding:2.5rem 3rem;max-width:380px;width:90vw;text-align:center;
  box-shadow:0 0 60px #00d4ff12,inset 0 1px 0 #ffffff08;
  animation:fadeUp .4s ease both;
}
.wait-icon{
  width:64px;height:64px;border-radius:50%;
  margin:0 auto 1.2rem;
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--wc,#00d4ff44)}50%{box-shadow:0 0 0 16px transparent}}
.wait-title{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.1em;margin-bottom:.5rem;}
.wait-sub{font-size:.88rem;color:var(--mut);line-height:1.6;margin-bottom:1.4rem;}
.wait-side-badge{
  display:inline-block;padding:.35rem .9rem;border-radius:8px;
  font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.12em;
  margin-bottom:1.4rem;
}
.wait-logout{background:none;border:1px solid #ff6b6b44;color:#ff6b6b88;font-family:'Orbitron',sans-serif;font-size:.62rem;letter-spacing:.1em;padding:.4rem .9rem;border-radius:8px;cursor:pointer;transition:all .2s;}
.wait-logout:hover{border-color:#ff6b6b;color:#ff6b6b;background:#ff6b6b12;}

/* Scoreboard ganador */
#winner-banner{
  position:fixed;inset:0;z-index:400;
  display:none;align-items:center;justify-content:center;
  background:#050a0fcc;backdrop-filter:blur(6px);
}
.winner-card{
  background:var(--sur);border:2px solid var(--wbc,#fff);border-radius:20px;
  padding:2.5rem 3rem;text-align:center;
  box-shadow:0 0 60px var(--wgc,#fff3);
  animation:fadeUp .5s ease both;
}
.winner-label{font-family:'Orbitron',sans-serif;font-size:.75rem;letter-spacing:.25em;color:var(--mut);text-transform:uppercase;margin-bottom:.5rem;}
.winner-name{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;margin-bottom:.3rem;}
.winner-score{font-size:1rem;color:var(--mut);margin-bottom:1.5rem;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="overlay">
  <div class="card">
    <div class="logo">TUG<span style="opacity:.6">XR</span></div>
    <div class="tagline">Jala la cuerda · WebXR</div>
    <label for="alias-input">Tu alias</label>
    <input id="alias-input" type="text" maxlength="20" placeholder="Ej: NinjaXR" autocomplete="off"/>
    <label>Elige tu lado</label>
    <div class="side-picker">
      <button class="side-btn left" data-side="LEFT">◀ IZQUIERDA</button>
      <button class="side-btn right" data-side="RIGHT">DERECHA ▶</button>
    </div>
    <button class="enter-btn" id="enter-btn" disabled>ENTRAR AL JUEGO</button>
    <div id="err-msg"></div>
  </div>
</div>

<!-- SALA DE ESPERA -->
<div id="waiting-screen">
  <div class="wait-card">
    <div class="wait-icon" id="wait-icon" style="background:#00d4ff18;border:2px solid var(--cl);--wc:#00d4ff44;">⏳</div>
    <div class="wait-title" id="wait-title">BUSCANDO RIVAL</div>
    <div class="wait-sub" id="wait-sub">Esperando que alguien se una al equipo contrario…</div>
    <div class="wait-side-badge" id="wait-badge"></div>
    <button class="wait-logout" onclick="logout()">✕ SALIR DEL JUEGO</button>
  </div>
</div>

<!-- JUEGO -->
<div id="game">
  <div id="stars-bg"></div>

  <!-- Controles top-left -->
  <div class="top-controls">
    <button class="ctrl-btn" id="music-btn" onclick="toggleMusic()">🔇 MÚSICA</button>
    <button class="ctrl-btn" id="logout-btn" onclick="logout()">✕ SALIR</button>
  </div>

  <!-- ESCENA 3D -->
  <div id="scene3d">
    <div class="world">
      <!-- Zonas -->
      <div class="zone left">
        <div id="avs-left"></div>
        <div class="zone-lbl">IZQUIERDA</div>
      </div>
      <div class="zone right">
        <div id="avs-right"></div>
        <div class="zone-lbl">DERECHA</div>
      </div>
      <!-- Suelo -->
      <div class="floor"></div>
      <!-- Poste -->
      <div class="pole"></div>
      <div class="pole-base"></div>
      <!-- Pivote -->
      <div class="pivot"></div>
      <!-- Barra -->
      <div id="bar-wrap">
        <div class="bar"></div>
        <div class="rope left" id="rope-l"></div>
        <div class="rope right" id="rope-r"></div>
        <div class="weight left" id="wt-left">
          <div class="wnum" id="wt-left-num">0</div>
          <div class="wlbl">IZQ</div>
        </div>
        <div class="weight right" id="wt-right">
          <div class="wnum" id="wt-right-num">0</div>
          <div class="wlbl">DER</div>
        </div>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-top">
      <div class="hud-side hud-left">
        <div class="num" id="hud-lc">0</div>
        <div class="lbl">izquierda</div>
      </div>
      <div class="hud-mid">
        <div class="tilt-lbl">inclinación</div>
        <div class="tilt-val center" id="hud-tilt">CENTRO</div>
      </div>
      <div class="hud-side hud-right">
        <div class="num" id="hud-rc">0</div>
        <div class="lbl">derecha</div>
      </div>
    </div>
    <div class="hud-bottom">
      <button class="hud-btn left" id="btn-go-left" onclick="pickSide('LEFT')">◀ IZQUIERDA</button>
      <button class="hud-btn right" id="btn-go-right" onclick="pickSide('RIGHT')">DERECHA ▶</button>
    </div>
  </div>

  <!-- Panel jugadores -->
  <div class="players-panel">
    <h4>Jugadores</h4>
    <div id="players-list"></div>
  </div>
</div>

<!-- Banner ganador -->
<div id="winner-banner">
  <div class="winner-card" id="winner-card">
    <div class="winner-label">🏆 EQUIPO GANADOR</div>
    <div class="winner-name" id="winner-name">IZQUIERDA</div>
    <div class="winner-score" id="winner-score"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://uedxajxmliwxdbbhphse.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZHhhanhtbGl3eGRiYmhwaHNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzAzNTgsImV4cCI6MjA5NDgwNjM1OH0.nZP8wR-52xoR9nwaXAmc00h1zxd51vWnEZJFmPgu464';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $=id=>document.getElementById(id);
let myId=crypto.randomUUID(),myAlias='',mySide=null,players=[];
let musicOn=false,audioCtx=null,musicNodes=[],currentMood=null;
let heartbeatTimer=null;

// ── VALIDACIÓN ──────────────────────────────────────────────
function validateAlias(a){
  if(typeof a!=='string') return{valid:false,error:'Alias inválido.'};
  const t=a.trim();
  if(!t.length) return{valid:false,error:'El alias no puede estar vacío.'};
  if(t.length<2) return{valid:false,error:'Mínimo 2 caracteres.'};
  if(t.length>20) return{valid:false,error:'Máximo 20 caracteres.'};
  if(!/^[a-zA-Z0-9_\- ]+$/.test(t)) return{valid:false,error:'Solo letras, números, guiones y espacios.'};
  return{valid:true};
}

// ── LÓGICA DE JUEGO ─────────────────────────────────────────
function countSides(ps){let l=0,r=0;for(const p of ps){if(p.side==='LEFT')l++;else if(p.side==='RIGHT')r++;}return{left:l,right:r};}
function getGameState(ps){
  const{left,right}=countSides(ps);
  const diff=left-right;
  const tilt=diff<0?'RIGHT':diff>0?'LEFT':'CENTER';
  const winner=left===0&&right===0?null:left>right?'LEFT':right>left?'RIGHT':null;
  // Sala de espera: necesita al menos 1 de cada lado para jugar
  const hasLeft=left>0, hasRight=right>0;
  const canPlay=hasLeft&&hasRight;
  return{left,right,diff,tilt,winner,canPlay,hasLeft,hasRight};
}

// ── LOGIN UI ─────────────────────────────────────────────────
document.querySelectorAll('.side-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.side-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    mySide=btn.dataset.side;
    updateBtn(); $('err-msg').textContent='';
  });
});
$('alias-input').addEventListener('input',()=>{$('err-msg').textContent='';updateBtn();});
function updateBtn(){$('enter-btn').disabled=!(validateAlias($('alias-input').value).valid&&mySide);}

$('enter-btn').addEventListener('click',async()=>{
  const raw=$('alias-input').value.trim();
  const v=validateAlias(raw);
  if(!v.valid){$('err-msg').textContent=v.error;return;}
  if(!mySide){$('err-msg').textContent='Elige un lado.';return;}
  myAlias=raw;
  $('enter-btn').disabled=true;
  $('enter-btn').textContent='CONECTANDO…';
  try{
    const{error}=await sb.from('tug_players').upsert({id:myId,alias:myAlias,side:mySide,last_seen:new Date().toISOString()});
    if(error)throw error;
    startGame();
  }catch(err){
    console.error(err);
    $('err-msg').textContent='Error de conexión.';
    $('enter-btn').disabled=false;
    $('enter-btn').textContent='ENTRAR AL JUEGO';
  }
});

// ── START GAME ───────────────────────────────────────────────
async function startGame(){
  $('overlay').style.display='none';
  $('game').style.display='block';
  initStars();
  await fetchPlayers();
  renderAll();
  sb.channel('tug_room')
    .on('postgres_changes',{event:'*',schema:'public',table:'tug_players'},p=>{handleRT(p);})
    .subscribe();
  window.addEventListener('beforeunload',()=>{removeMe();});
  heartbeatTimer=setInterval(async()=>{
    await sb.from('tug_players').update({last_seen:new Date().toISOString()}).eq('id',myId);
    const cutoff=new Date(Date.now()-35000).toISOString();
    await sb.from('tug_players').delete().lt('last_seen',cutoff);
    await fetchPlayers(); renderAll();
  },15000);
}

// ── REALTIME ─────────────────────────────────────────────────
function handleRT({eventType,new:row,old}){
  if(eventType==='INSERT'){if(!players.find(p=>p.id===row.id))players.push(row);}
  else if(eventType==='UPDATE'){const i=players.findIndex(p=>p.id===row.id);if(i>=0)players[i]=row;else players.push(row);}
  else if(eventType==='DELETE'){players=players.filter(p=>p.id!==old.id);}
  renderAll();
}
async function fetchPlayers(){const{data,error}=await sb.from('tug_players').select('*');if(!error&&data)players=data;}

// ── PICK SIDE ────────────────────────────────────────────────
async function pickSide(side){
  if(side===mySide)return;
  mySide=side;
  await sb.from('tug_players').update({side}).eq('id',myId);
  renderAll();
}

// ── LOGOUT ───────────────────────────────────────────────────
async function logout(){
  if(heartbeatTimer)clearInterval(heartbeatTimer);
  stopMusic();
  await removeMe();
  // Vuelta al login
  $('game').style.display='none';
  $('waiting-screen').style.display='none';
  $('overlay').style.display='flex';
  $('enter-btn').disabled=false;
  $('enter-btn').textContent='ENTRAR AL JUEGO';
  document.querySelectorAll('.side-btn').forEach(b=>b.classList.remove('selected'));
  $('alias-input').value='';
  mySide=null; myId=crypto.randomUUID();
  players=[];
}
async function removeMe(){await sb.from('tug_players').delete().eq('id',myId);}

// ── RENDER ───────────────────────────────────────────────────
function renderAll(){
  const s=getGameState(players);
  renderHUD(s);
  renderBalance(s);
  renderAvatars(s);
  renderPlayerList();
  renderWaiting(s);
  if(musicOn)updateMusic(s);
}

function renderHUD(s){
  $('hud-lc').textContent=s.left;
  $('hud-rc').textContent=s.right;
  const tv=$('hud-tilt');
  tv.textContent={LEFT:'IZQUIERDA',CENTER:'CENTRO',RIGHT:'DERECHA'}[s.tilt];
  tv.className='tilt-val '+s.tilt.toLowerCase();
  $('btn-go-left').classList.toggle('active',mySide==='LEFT');
  $('btn-go-right').classList.toggle('active',mySide==='RIGHT');
}

function renderBalance(s){
  const maxDeg=28;
  const deg=Math.max(-maxDeg,Math.min(maxDeg,s.diff*3));
  $('bar-wrap').style.transform=`translateX(-50%) rotate(${deg}deg)`;
  // Pesos muestran conteo
  $('wt-left-num').textContent=s.left;
  $('wt-right-num').textContent=s.right;
  // Glow del lado ganador
  const wl=$('wt-left'), wr=$('wt-right');
  wl.style.boxShadow=s.tilt==='LEFT'?'0 0 28px #00d4ffbb,0 4px 16px #0008':'0 4px 16px #0008';
  wr.style.boxShadow=s.tilt==='RIGHT'?'0 0 28px #ff4d6dbb,0 4px 16px #0008':'0 4px 16px #0008';
}

const AVCOLORS=['#00d4ff','#ff4d6d','#a8ff3e','#ffcc00','#c084fc','#fb923c','#34d399','#f472b6'];
function renderAvatars(s){
  const lc=$('avs-left'), rc=$('avs-right');
  lc.innerHTML=''; rc.innerHTML='';
  players.filter(p=>p.side==='LEFT').forEach(p=>lc.appendChild(makeChip(p)));
  players.filter(p=>p.side==='RIGHT').forEach(p=>rc.appendChild(makeChip(p)));
}
function makeChip(p){
  const color=AVCOLORS[(p.alias.charCodeAt(0)||0)%AVCOLORS.length];
  const d=document.createElement('div');
  d.className='av-chip';
  d.style.background=color;
  d.style.setProperty('--ac',color+'88');
  const init=p.alias.charAt(0).toUpperCase();
  d.innerHTML=`${init}<span class="av-tooltip">${p.alias}${p.id===myId?' ✦':''}</span>`;
  if(p.id===myId){d.style.outline=`2px solid #fff`;d.style.outlineOffset='2px';}
  return d;
}

function renderPlayerList(){
  const l=$('players-list');
  l.innerHTML='';
  players.forEach(p=>{
    const item=document.createElement('div'); item.className='player-item';
    const dot=document.createElement('span'); dot.className='pdot '+(p.side==='LEFT'?'l':'r');
    const name=document.createElement('span');
    name.textContent=p.alias+(p.id===myId?' ✦':'');
    name.style.color=p.id===myId?'#fff':'var(--mut)';
    item.append(dot,name); l.appendChild(item);
  });
}

// ── SALA DE ESPERA ───────────────────────────────────────────
function renderWaiting(s){
  const ws=$('waiting-screen');
  const game=$('game');

  if(!s.canPlay){
    // Mostrar sala de espera
    ws.style.display='flex';
    const badge=$('wait-badge');
    if(mySide==='LEFT'){
      badge.textContent='◀ EQUIPO IZQUIERDA';
      badge.style.cssText='background:#00d4ff1a;border:1px solid var(--cl);color:var(--cl);';
      $('wait-icon').style.background='#00d4ff18';
      $('wait-icon').style.borderColor='var(--cl)';
      $('wait-icon').style.setProperty('--wc','#00d4ff44');
    } else {
      badge.textContent='EQUIPO DERECHA ▶';
      badge.style.cssText='background:#ff4d6d1a;border:1px solid var(--cr);color:var(--cr);';
      $('wait-icon').style.background='#ff4d6d18';
      $('wait-icon').style.borderColor='var(--cr)';
      $('wait-icon').style.setProperty('--wc','#ff4d6d44');
    }
    // Mensaje personalizado
    const myInLeft=s.hasLeft&&mySide==='LEFT';
    const myInRight=s.hasRight&&mySide==='RIGHT';
    const rivalSide=mySide==='LEFT'?'RIGHT':'LEFT';
    const rivalName=mySide==='LEFT'?'DERECHA':'IZQUIERDA';
    if(!s.hasLeft&&!s.hasRight){
      $('wait-sub').textContent='Eres el primero. Esperando más jugadores…';
    } else if(mySide==='LEFT'&&!s.hasRight){
      $('wait-sub').textContent=`Tu equipo tiene ${s.left} jugador${s.left>1?'es':''}. Esperando al equipo DERECHA…`;
    } else if(mySide==='RIGHT'&&!s.hasLeft){
      $('wait-sub').textContent=`Tu equipo tiene ${s.right} jugador${s.right>1?'es':''}. Esperando al equipo IZQUIERDA…`;
    } else {
      $('wait-sub').textContent='Esperando que llegue el equipo contrario…';
    }
  } else {
    ws.style.display='none';
  }
}

// ── ESTRELLAS ────────────────────────────────────────────────
function initStars(){
  const bg=$('stars-bg');
  for(let i=0;i<160;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.8+.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*75}%;--d:${1.5+Math.random()*5}s;opacity:${Math.random()*.7+.15}`;
    bg.appendChild(s);
  }
  // Algunas estrellas grandes de colores
  for(let i=0;i<12;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*1.5+2.5;
    const colors=['#00d4ff','#ff4d6d','#a8ff3e','#ffffff'];
    const c=colors[Math.floor(Math.random()*colors.length)];
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*60}%;--d:${1+Math.random()*3}s;background:${c};box-shadow:0 0 4px ${c};`;
    bg.appendChild(s);
  }
}

// ── MÚSICA ───────────────────────────────────────────────────
function initAudio(){
  if(audioCtx)return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
}
function stopMusic(){
  musicNodes.forEach(n=>{try{n.stop(0);}catch(e){}});
  musicNodes=[];
}

/*
  Modos musicales:
  - 'winning_left':  victoria izquierda  → La mayor, upbeat azul
  - 'winning_right': victoria derecha    → Re mayor, upbeat rojo
  - 'draw':          empate              → Do mayor, tranquilo verde
  - 'idle':          solo un equipo      → ambiente neutro
*/
function getMusicalMood(s){
  if(s.left===0&&s.right===0) return 'idle';
  if(s.left===s.right) return 'draw';
  if(s.left>s.right) return 'winning_left';
  return 'winning_right';
}

const MOODS={
  winning_left:{
    freqs:[220,277.18,329.63,440,554.37],// La mayor (A-C#-E-A-C#)
    bass:110,wave:'sawtooth',lfoRate:.55,tempo:0.45,
    color:['#00d4ff','IZQUIERDA GANA']
  },
  winning_right:{
    freqs:[293.66,369.99,440,587.33,739.99],// Re mayor (D-F#-A-D-F#)
    bass:146.83,wave:'square',lfoRate:.65,tempo:0.38,
    color:['#ff4d6d','DERECHA GANA']
  },
  draw:{
    freqs:[261.63,329.63,392,523.25],// Do mayor (C-E-G-C)
    bass:130.81,wave:'sine',lfoRate:.25,tempo:0.8,
    color:['#a8ff3e','EMPATE']
  },
  idle:{
    freqs:[185,220,277.18,370],// La menor (ambient)
    bass:92.5,wave:'sine',lfoRate:.15,tempo:1.2,
    color:['#4a7090','EN ESPERA']
  }
};

function playMood(mood){
  if(mood===currentMood)return;
  currentMood=mood;
  stopMusic();
  if(!audioCtx)return;
  const cfg=MOODS[mood];
  const master=audioCtx.createGain();
  master.gain.setValueAtTime(0,audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.14,audioCtx.currentTime+1.8);
  master.connect(audioCtx.destination);

  // Reverb via convolver simulado con delay
  const convDelay=audioCtx.createDelay(1.0);
  convDelay.delayTime.setValueAtTime(0.28,audioCtx.currentTime);
  const convGain=audioCtx.createGain();
  convGain.gain.setValueAtTime(0.2,audioCtx.currentTime);
  master.connect(convDelay);
  convDelay.connect(convGain);
  convGain.connect(master);

  // Harmónicos
  cfg.freqs.forEach((freq,i)=>{
    const osc=audioCtx.createOscillator();
    osc.type=cfg.wave;
    osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
    const lfo=audioCtx.createOscillator();
    lfo.frequency.setValueAtTime(cfg.lfoRate+i*.07,audioCtx.currentTime);
    const lfoG=audioCtx.createGain();
    lfoG.gain.setValueAtTime(freq*.012,audioCtx.currentTime);
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(0.22-i*.035,audioCtx.currentTime);
    osc.connect(g); g.connect(master);
    osc.start(); lfo.start();
    musicNodes.push(osc,lfo);
  });

  // Bajo pulsante con ritmo según mood
  const bass=audioCtx.createOscillator();
  bass.type='triangle';
  bass.frequency.setValueAtTime(cfg.bass,audioCtx.currentTime);
  const bassG=audioCtx.createGain();
  bassG.gain.setValueAtTime(0,audioCtx.currentTime);
  const now=audioCtx.currentTime;
  const t=cfg.tempo;
  for(let i=0;i<80;i++){
    bassG.gain.setValueAtTime(0.35,now+i*t);
    bassG.gain.exponentialRampToValueAtTime(0.001,now+i*t+t*.75);
  }
  bass.connect(bassG); bassG.connect(master);
  bass.start(); musicNodes.push(bass);

  // Arpeggio para modos de victoria
  if(mood==='winning_left'||mood==='winning_right'){
    const arpFreqs=cfg.freqs.slice(0,4);
    arpFreqs.forEach((f,i)=>{
      const aOsc=audioCtx.createOscillator();
      aOsc.type='sine';
      aOsc.frequency.setValueAtTime(f*2,audioCtx.currentTime);
      const aG=audioCtx.createGain();
      aG.gain.setValueAtTime(0,audioCtx.currentTime);
      const step=cfg.tempo/arpFreqs.length;
      for(let j=0;j<60;j++){
        const onset=audioCtx.currentTime+j*cfg.tempo+i*step;
        aG.gain.setValueAtTime(0.12,onset);
        aG.gain.exponentialRampToValueAtTime(0.001,onset+step*.8);
      }
      aOsc.connect(aG); aG.connect(master);
      aOsc.start(); musicNodes.push(aOsc);
    });
  }
}

function updateMusic(s){
  playMood(getMusicalMood(s));
}

function toggleMusic(){
  musicOn=!musicOn;
  const btn=$('music-btn');
  if(!musicOn){
    stopMusic(); currentMood=null;
    btn.innerHTML='🔇 MÚSICA';
    btn.style.background='#050a0fcc';
  } else {
    initAudio();
    btn.innerHTML='🔊 MÚSICA';
    btn.style.background='#a8ff3e18';
    updateMusic(getGameState(players));
  }
}
</script>
